global:
  schedule: 0 8,12,18,22 * * *
  delivery: origin
  model: ''
  max_total_items: 10
  quiet_hours: 23:00-07:00
topics:
- name: Bitcoin
  enabled: true
  max_items: 5
  summary: Bitcoin and major crypto market developments
  rss_feeds:
  - CoinDesk
  - Bitcoin Magazine
  x_queries:
  - Bitcoin
  - BTC price
  - Bitcoin regulation OR SEC OR ETF
  x_allowed_handles:
  - cz_binance
  - APompliano
  - saylor
  - VitalikButerin
  - BitcoinMagazine
  - coindesk
  - TheBlock__
  - GlassnodeAlerts
  - WhaleAlert
  x_excluded_handles:
  - elonmusk
  - CryptoCobain
  keywords_include:
  - Bitcoin
  - BTC
  - ETF
  - SEC
  - regulation
  - halving
  - adoption
  - institutional
  - hack
  - exploit
  - upgrade
  - Lightning
  - Ordinals
  - BRC-20
  keywords_exclude:
  - shitcoin
  - memecoin
  - 1000x
  - moon
  - lamborghini
  - giveaway
  - airdrop
  importance_rules: 'Only include items that meet at least ONE of these criteria:

    - Major price move (>5% in 24h) with a clear catalyst

    - Regulatory action (SEC, CFTC, Fed, major country)

    - Security incident (hack, exploit, >$10M)

    - Institutional adoption (ETF, corporate treasury, bank)

    - Significant protocol upgrade or change

    - High-engagement post (>500 likes) from Tier 1 account


    EXCLUDE:

    - Price predictions without analysis or catalyst

    - Meme posts or jokes

    - Altcoin promotion disguised as Bitcoin news

    - Duplicate stories (same event, multiple sources)

    - Posts primarily about altcoins

    '
- name: Ethereum
  enabled: false
  max_items: 3
  summary: Ethereum ecosystem developments
  rss_feeds:
  - Ethereum Blog
  x_queries:
  - Ethereum
  - ETH price
  - Ethereum upgrade OR EIP
  x_allowed_handles:
  - VitalikButerin
  - ethereum
  - BanklessHQ
  keywords_include:
  - Ethereum
  - ETH
  - EIP
  - upgrade
  - staking
  - L2
  - rollup
  keywords_exclude:
  - meme
  - NFT
  importance_rules: 'Focus on: protocol upgrades, major L2 developments, staking changes,

    regulatory clarity, significant security incidents.

    Skip: NFT floor prices, minor DeFi yield changes, memes.

    '
